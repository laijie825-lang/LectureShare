            return <div className={`inline-flex ${className}`} style={{width: size, height: size, display: 'inline-block'}} dangerouslySetInnerHTML={{__html: IconSvg()}} />;
        };

        // Import the app component inline
        function App() {
            return (
                <div className="min-h-screen bg-gradient-to-br from-blue-50 to-slate-100 dark:from-slate-950 dark:to-slate-900 flex items-center justify-center p-4">
                    <div className="text-center max-w-2xl">

                        <p className="text-xl text-slate-600 dark:text-slate-300 mb-8">

                        </p>
                        <div className="bg-white dark:bg-slate-900 rounded-xl shadow-lg p-8 mb-6">

                                </li>

                                    <span className="flex items-center justify-center w-6 h-6 bg-blue-100 dark:bg-blue-900 text-blue-600 dark:text-blue-300 rounded-full text-sm font-semibold flex-shrink-0">2</span>

                                </li>
